name: Grandexchange
version: '${project.version}'
main: com.github.petterj345.grandexchange.Grandexchange
api-version: '1.21'
description: '${project.description}'
author: petterj345
softdepend: [Vault, Citizens]

# Loaded at runtime by Paper's library loader (downloaded from Maven Central).
libraries:
  - org.xerial:sqlite-jdbc:3.46.1.3

commands:
  grandexchange:
    description: Open and use the Grand Exchange.
    usage: /grandexchange [sell|mine|help]
    aliases: [ge, gx]

permissions:
  grandexchange.use:
    description: Allows browsing, buying and selling on the Grand Exchange.
    default: true
