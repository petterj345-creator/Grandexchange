# Maximum number of active offers (buy + sell) a single player can have at once.
max-listings-per-player: 20

# Items that may be listed on the exchange. Only these resources can be put into
# buy and sell orders; anything not in this list is rejected.
#
# Use Bukkit material names (https://jd.papermc.io/paper/1.21/org/bukkit/Material.html),
# case-insensitive. Unknown names are skipped with a warning in the server log.
# After editing, run /ge reload (or restart) to apply the changes.
